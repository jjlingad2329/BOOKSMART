kind = "web"
previewPath = "/"
title = "BookSmart"
version = "1.0.0"
id = "artifacts/booksmart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24254

[services.development]
run = "pnpm --filter @workspace/booksmart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/booksmart", "run", "build" ]
publicDir = "artifacts/booksmart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24254"
BASE_PATH = "/"
